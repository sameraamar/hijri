name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build engine (required by web typecheck)
        run: npm run -w @hijri/calendar-engine build

      - name: Type-check web app
        run: npx --workspace=apps/web tsc -b

      - name: Lint
        run: npm run lint

      - name: Run tests (engine + web)
        run: npm test
